services:
  backend:
    build: ./backend
    environment:
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: sqlite:////data/artik_notifier.db
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8088}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8088}
      SCHEDULER_ENABLED: "true"
      SCHEDULER_INTERVAL_MINUTES: "60"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-Artik Notifier <no-reply@artiknotifier.local>}
    volumes:
      - notifier_data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8088:80"
    restart: unless-stopped

volumes:
  notifier_data:
