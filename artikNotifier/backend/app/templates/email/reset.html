<!doctype html>
<html><head><meta charset="utf-8"></head>
<body style="margin:0;background:#0d1117;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#e6edf3;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0d1117;padding:28px 12px;">
    <tr><td align="center">
      <table role="presentation" width="100%" style="max-width:520px;background:#161b22;border:1px solid #30363d;border-radius:14px;">
        <tr><td style="padding:24px 26px;">
          <h1 style="margin:0 0 10px;font-size:20px;color:#fff;">🔔 {{ brand }}</h1>
          <p style="margin:0 0 16px;color:#d7dee7;font-size:15px;">Hi {{ name }}, we received a request to reset your password.</p>
          <a href="{{ link }}" style="display:inline-block;background:#1f6feb;color:#fff;text-decoration:none;font-weight:600;padding:11px 22px;border-radius:10px;font-size:14px;">Reset password →</a>
          <p style="margin:16px 0 0;color:#6e7681;font-size:12px;">If you didn't request this, you can ignore this email. The link expires shortly.</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body></html>
